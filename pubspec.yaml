name: rico_app
description: "ريكو - مساعد ذكي يقترح لك أقرب مطعم أو أرخص عرض حسب موقعك في السعودية"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  geolocator: ^12.0.0
  http: ^1.2.1
  url_launcher: ^6.2.6
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
    - assets/icon/foreground.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0B1320"
  adaptive_icon_foreground: "assets/icon/foreground.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter_native_splash:
  color: "#0B1320"
  image: assets/icon/foreground.png
  android_12:
    color: "#0B1320"
    image: assets/icon/foreground.png
  android: true
  ios: true
  web: false
